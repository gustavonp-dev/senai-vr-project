<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENAI - Visualizador WebXR Integrado</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  
  <style>
    /* Interface 2D de upload */
    #upload-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      max-width: 300px;
    }
    
    h1 { font-size: 16px; margin: 0 0 5px 0; color: #0054a6; }
    p { font-size: 12px; color: #555; margin: 0 0 15px 0; }
    input[type="file"] { width: 100%; font-size: 12px; }

    /* ==============================================
       O NOSSO PRÓPRIO BOTÃO VR (Canto Superior Direito)
       ============================================== */
    #meu-botao-vr {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10000; /* Fica acima de tudo */
      background-color: #333333;
      color: white;
      border: 2px solid white;
      padding: 10px 15px;
      border-radius: 5px;
      font-family: sans-serif;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #meu-botao-vr:hover { background-color: #555555; }

    /* Ajustes para o ecrã do telemóvel */
    @media (max-width: 768px) {
      #upload-container {
        max-width: 180px;
        padding: 12px;
      }
      h1 { font-size: 13px; }
      p { font-size: 10px; margin: 0 0 8px 0; }
      input[type="file"] { font-size: 10px; }
      
      #meu-botao-vr {
        font-size: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

  <div id="upload-container">
    <h1>Laboratório VR</h1>
    <p>Selecione um ficheiro 3D (.glb ou .gltf).</p>
    <input type="file" id="file-chooser" accept=".gltf,.glb">
  </div>

  <button id="meu-botao-vr">Entrar no VR</button>

  <a-scene embedded style="width: 100vw; height: 100vh;" vr-mode-ui="enterVRButton: #meu-botao-vr">
    <a-sky color="#cce6ff"></a-sky>
    <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#333" roughness="0.8"></a-plane>
    <a-grid position="0 0.01 0" cell-size="1" color="#666"></a-grid>

    <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.5" position="-1 4 2"></a-light>

    <a-entity id="render-target" position="0 1.2 -3" rotation="0 0 0"></a-entity>

    <a-entity camera look-controls position="0 1.6 0">
      <a-cursor color="#ffcc00" fuse="true" fuse-timeout="1500"></a-cursor>
    </a-entity>
  </a-scene>

  <script>
    document.getElementById('file-chooser').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const blobURL = URL.createObjectURL(file);
      const container = document.getElementById('render-target');
      container.innerHTML = '';

      const novoModelo = document.createElement('a-gltf-model');
      novoModelo.setAttribute('src', blobURL);
      novoModelo.setAttribute('scale', '1 1 1');

      novoModelo.addEventListener('model-loaded', () => {
        console.log('Modelo carregado com sucesso!');
      });

      novoModelo.addEventListener('model-error', (err) => {
        alert('Erro ao processar o ficheiro 3D.');
      });

      container.appendChild(novoModelo);
    });
  </script>
</body>
</html>
